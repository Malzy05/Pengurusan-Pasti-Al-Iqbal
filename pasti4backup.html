const AuthContext = createContext(null);
const AuthProvider = ({ children }) => {
    const [user, setUser] = useState(() => {
        const saved = localStorage.getItem('pasti_currentUser');
        return saved ? JSON.parse(saved) : null;
    });
    const login = (ic, password) => {
        const users = getData('users');
        const found = users.find(u => u.ic === ic && u.password === password);
        if (found) { setUser(found); localStorage.setItem('pasti_currentUser', JSON.stringify(found)); return { success: true, user: found }; }
        return { success: false, message: 'IC atau kata laluan salah' };
    };
    const logout = () => { setUser(null); localStorage.removeItem('pasti_currentUser'); };
    const updateUser = (updatedUser) => {
        const users = getData('users');
        const idx = users.findIndex(u => u.id === updatedUser.id);
        if (idx !== -1) {
            const oldIc = users[idx].ic;
            users[idx] = updatedUser;
            setData('users', users);
            setUser(updatedUser);
            localStorage.setItem('pasti_currentUser', JSON.stringify(updatedUser));
        }
    };
    return <AuthContext.Provider value={{ user, login, logout, updateUser }}>{children}</AuthContext.Provider>;
};

const ProfilePage = ({ user }) => {
    const { updateUser } = useContext(AuthContext);
    const isAdmin = user.role === 'admin';
    const [form, setForm] = useState({
        nama: user.nama || '',
        ic: user.ic || '',
        noHp: user.noHp || '',
        alamat: user.alamat || '',
        tarikhLahir: user.tarikhLahir || '',
        tarikhMula: user.tarikhMula || '',
        kelas: user.kelas || '',
        password: '',
        passwordBaru: '',
        passwordSahkan: ''
    });
    const [success, setSuccess] = useState('');
    const [error, setError] = useState('');
    const [showConfirm, setShowConfirm] = useState(false);
    const [pendingChanges, setPendingChanges] = useState(null);

    useEffect(() => {
        setForm({
            nama: user.nama || '',
            ic: user.ic || '',
            noHp: user.noHp || '',
            alamat: user.alamat || '',
            tarikhLahir: user.tarikhLahir || '',
            tarikhMula: user.tarikhMula || '',
            kelas: user.kelas || '',
            password: '',
            passwordBaru: '',
            passwordSahkan: ''
        });
    }, [user.id, user.ic]);

    const handleSave = () => {
        if (!form.nama) return setError('Nama tidak boleh kosong');
        if (!form.ic) return setError('No IC tidak boleh kosong');
        if (form.passwordBaru && form.passwordBaru !== form.passwordSahkan) return setError('Kata laluan baru tidak sepadan');
        if (form.passwordBaru && form.password !== user.password) return setError('Kata laluan semasa tidak betul');

        const changes = { ...user, nama: form.nama, ic: form.ic, noHp: form.noHp, alamat: form.alamat, tarikhLahir: form.tarikhLahir, tarikhMula: form.tarikhMula };
        if (!isAdmin) changes.kelas = form.kelas;
        if (form.passwordBaru) changes.password = form.passwordBaru;

        if (form.ic !== user.ic) {
            const users = getData('users');
            const duplicate = users.find(u => u.ic === form.ic && u.id !== user.id);
            if (duplicate) return setError('No IC ini telah digunakan oleh pengguna lain');
            setPendingChanges(changes);
            setShowConfirm(true);
        } else {
            updateUser(changes);
            setSuccess('Profil berjaya dikemas kini!');
            setError('');
            setForm({...form, password: '', passwordBaru: '', passwordSahkan: ''});
            setTimeout(() => setSuccess(''), 3000);
        }
    };

    const confirmUpdate = () => {
        if (pendingChanges) {
            updateUser(pendingChanges);
            setSuccess('Profil berjaya dikemas kini! No IC baru akan digunakan untuk log masuk seterusnya.');
            setError('');

// ==================== STAFF MANAGEMENT ====================
const StaffManagement = ({ user }) => {
    const [staffs, setStaffs] = useState([]); 
    const [showForm, setShowForm] = useState(false);
    const [editId, setEditId] = useState(null);
    const [form, setForm] = useState({ nama: '', kelas: '', ic: '', noHp: '', alamat: '', tarikhLahir: '', tarikhMula: '', password: '' });
    const fetchStaff = async () => {
        const { data, error } = await _supabase.from('staff').select('*');
        if (error) {
            console.error("Ralat ambil data:", error.message);
        } else {
            setStaffs(data || []); 
        }
    };

    useEffect(() => {
        fetchStaff();
    }, []);

    const addStaff = () => { setEditId(null); setForm({ nama: '', kelas: '', ic: '', noHp: '', alamat: '', tarikhLahir: '', tarikhMula: '', password: '' }); setShowForm(true); };
    const editStaff = (s) => { setEditId(s.id); setForm(s); setShowForm(true); };

    const saveStaff = async () => {
        if (!form.nama || !form.ic || !form.kelas) return alert('Sila lengkapkan maklumat');
        
        if (editId) {
            const { error } = await _supabase.from('staff').update(form).eq('id', editId);
            if (error) alert('Ralat semasa kemas kini: ' + error.message);
        } else {
            const { error } = await _supabase.from('staff').insert([form]);
            if (error) alert('Ralat semasa menambah: ' + error.message);
        }
        
        setShowForm(false);
        fetchStaff(); 
    };

    const deleteStaff = async (id) => { 
        if (confirm('Adakah anda pasti?')) { 
            const { error } = await _supabase.from('staff').delete().eq('id', id);
            if (error) alert('Ralat padam: ' + error.message);
            else fetchStaff(); 
        } 
    };

    return (
        <div className="fade-in">
            <div className="flex justify-between items-center mb-6 flex-wrap gap-2"><h2 className="text-2xl font-bold text-gray-800">Pengurusan Staff</h2><button onClick={addStaff} className="px-4 py-2 bg-emerald-600 text-white rounded-lg text-sm hover:bg-emerald-700">+ Tambah Staff</button></div>
            <div className="bg-white rounded-xl shadow-sm border border-gray-100 overflow-hidden"><table className="w-full text-sm"><thead className="bg-gray-50"><tr><th className="px-4 py-3 text-left font-medium text-gray-600">Nama</th><th className="px-4 py-3 text-left font-medium text-gray-600">Kelas</th><th className="px-4 py-3 text-left font-medium text-gray-600">No IC</th><th className="px-4 py-3 text-left font-medium text-gray-600">No HP</th><th className="px-4 py-3 text-left font-medium text-gray-600">Tarikh Mula</th><th className="px-4 py-3 text-center font-medium text-gray-600">Tindakan</th></tr></thead><tbody className="divide-y divide-gray-100">
                {staffs.map(s => (<tr key={s.id} className="hover:bg-gray-50"><td className="px-4 py-3 font-medium">{s.nama}</td><td className="px-4 py-3">{s.kelas}</td><td className="px-4 py-3">{s.ic}</td><td className="px-4 py-3">{s.noHp}</td><td className="px-4 py-3">{s.tarikhMula}</td><td className="px-4 py-3 text-center"><div className="flex justify-center gap-2"><button onClick={() => editStaff(s)} className="px-3 py-1 bg-blue-100 text-blue-700 rounded text-xs hover:bg-blue-200">Edit</button><button onClick={() => deleteStaff(s.id)} className="px-3 py-1 bg-red-100 text-red-700 rounded text-xs hover:bg-red-200">Padam</button></div></td></tr>))}
            </tbody></table></div>
            {showForm && <Modal title={editId ? 'Edit Maklumat Staff' : 'Tambah Staff Baru'} onClose={() => setShowForm(false)}>
                <div className="grid grid-cols-1 md:grid-cols-2 gap-4"><Field label="Nama Penuh" value={form.nama} onChange={v => setForm({...form, nama: v})} /><Field label="Nama Kelas" value={form.kelas} onChange={v => setForm({...form, kelas: v})} /><Field label="No IC" value={form.ic} onChange={v => setForm({...form, ic: v})} /><Field label="No Telefon" value={form.noHp} onChange={v => setForm({...form, noHp: v})} /><Field label="Alamat" value={form.alamat} onChange={v => setForm({...form, alamat: v})} /><Field label="Tarikh Lahir" type="date" value={form.tarikhLahir} onChange={v => setForm({...form, tarikhLahir: v})} /><Field label="Tarikh Mula Bekerja" type="date" value={form.tarikhMula} onChange={v => setForm({...form, tarikhMula: v})} /><Field label="Kata Laluan" type="password" value={form.password} onChange={v => setForm({...form, password: v})} /></div>
                <button onClick={saveStaff} className="mt-4 w-full bg-emerald-600 text-white py-2 rounded-lg hover:bg-emerald-700">Simpan</button>
            </Modal>}
        </div>
    );
};

const StaffAttendance = () => {
    const [staffs] = useState(getData('users').filter(u => u.role === 'staff'));
    const [attData, setAttData] = useState(getData('staffAttendance'));
    const [selectedDate, setSelectedDate] = useState(new Date().toISOString().split('T')[0]);
    const [editMode, setEditMode] = useState(false);
    const saveAttendance = () => { const existing = attData.filter(a => a.tarikh !== selectedDate); const newEntries = staffs.map(s => { const existingEntry = attData.find(a => a.staffId === s.id && a.tarikh === selectedDate); return existingEntry || { id: generateId(), staffId: s.id, tarikh: selectedDate, status: 'Hadir' }; }); const updated = [...existing, ...newEntries]; setData('staffAttendance', updated); setAttData(updated); setEditMode(false); };
    const getDayStatus = (staffId) => { const entry = attData.find(a => a.staffId === staffId && a.tarikh === selectedDate); return entry ? entry.status : 'Hadir'; };
    const updateStatus = (staffId, status) => { setAttData(prev => { const idx = prev.findIndex(a => a.staffId === staffId && a.tarikh === selectedDate); if (idx !== -1) { prev[idx].status = status; } return [...prev]; }); };
    return (
        <div className="fade-in">
            <div className="flex justify-between items-center mb-6 flex-wrap gap-2"><h2 className="text-2xl font-bold text-gray-800">Kehadiran Staff</h2><div className="flex gap-2 items-center"><input type="date" value={selectedDate} onChange={e => setSelectedDate(e.target.value)} className="px-3 py-2 border rounded-lg text-sm" />{!editMode && <button onClick={() => setEditMode(true)} className="px-4 py-2 bg-emerald-600 text-white rounded-lg text-sm">Edit Kehadiran</button>}{editMode && <button onClick={saveAttendance} className="px-4 py-2 bg-blue-600 text-white rounded-lg text-sm">Simpan</button>}</div></div>
            <div className="bg-white rounded-xl shadow-sm border border-gray-100 overflow-hidden"><table className="w-full text-sm"><thead className="bg-gray-50"><tr><th className="px-4 py-3 text-left font-medium text-gray-600">Nama</th><th className="px-4 py-3 text-left font-medium text-gray-600">Kelas</th><th className="px-4 py-3 text-center font-medium text-gray-600">Status</th><th className="px-4 py-3 text-center font-medium text-gray-600">Jumlah Hadir</th></tr></thead><tbody className="divide-y divide-gray-100">
                {staffs.map(s => { const status = getDayStatus(s.id); const total = attData.filter(a => a.staffId === s.id && a.status === 'Hadir').length; const color = status === 'Hadir' ? 'bg-emerald-100 text-emerald-700' : status === 'Cuti' ? 'bg-amber-100 text-amber-700' : 'bg-red-100 text-red-700'; return (<tr key={s.id} className="hover:bg-gray-50"><td className="px-4 py-3 font-medium">{s.nama}</td><td className="px-4 py-3">{s.kelas}</td><td className="px-4 py-3 text-center">{editMode ? (<select value={status} onChange={e => updateStatus(s.id, e.target.value)} className="px-2 py-1 border rounded text-sm"><option>Hadir</option><option>Cuti</option><option>Tidak Hadir</option><option>Sakit</option></select>) : <span className={`px-2 py-1 rounded text-xs font-medium ${color}`}>{status}</span>}</td><td className="px-4 py-3 text-center"><span className="font-medium">{total}</span></td></tr>); })}
            </tbody></table></div>
        </div>
    );
};

const GradeManagement = () => {

    const [editId, setEditId] = useState(null);

    const deleteGrade = (id) => { setData('grades', grades.filter(g => g.id !== id)); setGrades(grades.filter(g => g.id !== id)); };
    return (

            <div className="bg-white rounded-xl shadow-sm border border-gray-100 overflow-hidden"><table className="w-full text-sm"><thead className="bg-gray-50"><tr><th className="px-4 py-3 text-left font-medium text-gray-600">Gred</th><th className="px-4 py-3 text-left font-medium text-gray-600">Markah Minimum</th><th className="px-4 py-3 text-left font-medium text-gray-600">Markah Maksimum</th><th className="px-4 py-3 text-center font-medium text-gray-600">Tindakan</th></tr></thead><tbody className="divide-y divide-gray-100">
                {grades.map(g => (<tr key={g.id} className="hover:bg-gray-50"><td className="px-4 py-3"><span className="bg-blue-100 text-blue-700 px-3 py-1 rounded-full text-sm font-bold">{g.gred}</span></td><td className="px-4 py-3">{g.min}</td><td className="px-4 py-3">{g.max}</td><td className="px-4 py-3 text-center"><div className="flex justify-center gap-2"><button onClick={() => editGrade(g)} className="px-3 py-1 bg-blue-100 text-blue-700 rounded text-xs">Edit</button><button onClick={() => deleteGrade(g.id)} className="px-3 py-1 bg-red-100 text-red-700 rounded text-xs">Padam</button></div></td></tr>))}

                <div className="space-y-4"><Field label="Gred" value={form.gred} onChange={v => setForm({...form, gred: v})} /><Field label="Markah Minimum" type="number" value={form.min} onChange={v => setForm({...form, min: v})} /><Field label="Markah Maksimum" type="number" value={form.max} onChange={v => setForm({...form, max: v})} /></div>
                <button onClick={saveGrade} className="mt-4 w-full bg-emerald-600 text-white py-2 rounded-lg hover:bg-emerald-700">Simpan</button>
            </Modal>}
        </div>
    );

const CalendarPage = ({ user }) => {
    const [selectedYear, setSelectedYear] = useState(2024);
    const [selectedMonth, setSelectedMonth] = useState(new Date().getMonth() + 1);
    const [events, setEvents] = useState(getData('calendarEvents'));
    const [showForm, setShowForm] = useState(false);
    const [selectedDay, setSelectedDay] = useState(null);
    const [formData, setFormData] = useState({ title: '', type: 'aktiviti' });
    const isAdmin = user.role === 'admin';
    const monthNames = ['Januari', 'Februari', 'Mac', 'April', 'Mei', 'Jun', 'Julai', 'Ogos', 'September', 'Oktober', 'November', 'Disember'];
    const dayNames = ['Ahd', 'Isn', 'Sel', 'Rab', 'Kha', 'Jum', 'Sab'];
    const getDaysInMonth = (y, m) => new Date(y, m, 0).getDate();
    const getFirstDayOfMonth = (y, m) => new Date(y, m - 1, 1).getDay();
    const daysInMonth = getDaysInMonth(selectedYear, selectedMonth);
    const firstDay = getFirstDayOfMonth(selectedYear, selectedMonth);
    const openDayForm = (day) => { if (!isAdmin) return; setSelectedDay(day); setFormData({ title: '', type: 'aktiviti' }); setShowForm(true); };
    const saveEvent = () => { if (!formData.title || !selectedDay) return; const tarikh = `${selectedYear}-${String(selectedMonth).padStart(2, '0')}-${String(selectedDay).padStart(2, '0')}`; setEvents(prev => { const updated = [...prev, { ...formData, id: generateId(), tarikh }]; setData('calendarEvents', updated); return updated; }); setShowForm(false); };
    const getDayEvents = (day) => { const tarikh = `${selectedYear}-${String(selectedMonth).padStart(2, '0')}-${String(day).padStart(2, '0')}`; return events.filter(e => e.tarikh === tarikh); };
    const deleteEvent = (id) => { const updated = events.filter(e => e.id !== id); setData('calendarEvents', updated); setEvents(updated); };
    const yearOptions = []; for (let y = 2024; y <= 2050; y++) yearOptions.push(y);
    const typeColors = { aktiviti: 'bg-blue-100 text-blue-700', cuti: 'bg-red-100 text-red-700', lain: 'bg-purple-100 text-purple-700' };
    return (
        <div className="fade-in">
            <h2 className="text-2xl font-bold text-gray-800 mb-6">Kalendar PASTI</h2>
            <div className="flex gap-4 mb-6 items-center flex-wrap">
                <select value={selectedYear} onChange={e => setSelectedYear(parseInt(e.target.value))} className="px-3 py-2 border rounded-lg">{yearOptions.map(y => <option key={y} value={y}>{y}</option>)}</select>
                <select value={selectedMonth} onChange={e => setSelectedMonth(parseInt(e.target.value))} className="px-3 py-2 border rounded-lg">{monthNames.map((m, i) => <option key={i} value={i + 1}>{m}</option>)}</select>
                {!isAdmin && <span className="text-sm text-gray-500 bg-gray-100 px-3 py-2 rounded-lg">Mod Lihat Sahaja</span>}
            </div>
            <div className="bg-white rounded-xl shadow-sm border border-gray-100 p-4">
                <div className="grid grid-cols-7 gap-1 mb-2">{dayNames.map(d => <div key={d} className="text-center text-xs font-medium text-gray-500 py-2">{d}</div>)}</div>
                <div className="grid grid-cols-7 gap-1">
                    {Array.from({ length: firstDay }).map((_, i) => <div key={`empty-${i}`} className="h-24 bg-gray-50 rounded" />)}
                    {Array.from({ length: daysInMonth }).map((_, i) => {
                        const day = i + 1; const dayEvts = getDayEvents(day);
                        return (<div key={day} className={`h-24 border border-gray-100 rounded p-1 overflow-hidden ${isAdmin ? 'cursor-pointer hover:bg-gray-50' : ''}`} onClick={() => openDayForm(day)}>
                            <div className="text-xs font-medium text-gray-700 mb-1">{day}</div>
                            {dayEvts.map(ev => (<div key={ev.id} className={`${typeColors[ev.type] || typeColors.lain} text-xs px-1 py-0.5 rounded mb-0.5 truncate`}>{ev.title}</div>))}
                        </div>);
                    })}
                </div>
            </div>
            {showForm && <Modal title={`Aktiviti ${selectedDay}/${selectedMonth}/${selectedYear}`} onClose={() => setShowForm(false)}>
                <div className="space-y-4">
                    <div className="mb-3"><p className="text-sm font-medium text-gray-700 mb-2">Senarai Aktiviti:</p>
                        {getDayEvents(selectedDay).map(ev => (<div key={ev.id} className="flex justify-between items-center bg-gray-50 p-2 rounded mb-1"><span className={`${typeColors[ev.type]} px-2 py-1 rounded text-xs`}>{ev.title} ({ev.type})</span><button onClick={() => deleteEvent(ev.id)} className="text-red-500 text-xs hover:text-red-700">Padam</button></div>))}</div>

                    <div><label className="block text-sm font-medium text-gray-700 mb-1">Jenis</label><select value={formData.type} onChange={e => setFormData({...formData, type: e.target.value})} className="w-full px-3 py-2 border rounded-lg"><option value="aktiviti">Aktiviti</option><option value="cuti">Cuti Umum</option><option value="lain">Lain-lain</option></select></div>

            </Modal>}
        </div>
    );
};

    const getStatus = (studentId) => { const entry = attData.find(a => a.studentId === studentId && a.tarikh === selectedDate); return entry ? entry.status : 'Hadir'; };
    const updateStatus = (studentId, status) => { setAttData(prev => { const idx = prev.findIndex(a => a.studentId === studentId && a.tarikh === selectedDate); if (idx !== -1) { prev[idx].status = status; } return [...prev]; }); };

    const currentYear = new Date().getFullYear();
    const yearOptions = []; for (let y = currentYear; y <= 2050; y++) yearOptions.push(y);
    const logbooks = allLogbooks.filter(l => l.tahun === selectedTahun);
    const [showForm, setShowForm] = useState(false);
    const [editId, setEditId] = useState(null);
    const [form, setForm] = useState({ tarikh: new Date().toISOString().split('T')[0], aktiviti: '', catatan: '', gambar: '' });
    const addLogbook = () => { setEditId(null); setForm({ tarikh: new Date().toISOString().split('T')[0], aktiviti: '', catatan: '', gambar: '' }); setShowForm(true); };
    const editLogbook = (lb) => { setEditId(lb.id); setForm(lb); setShowForm(true); };
    const saveLogbook = () => {
        if (!form.tarikh || !form.aktiviti) return alert('Lengkapkan maklumat');
        const all = getData('logbooks');
        if (editId) { const idx = all.findIndex(l => l.id === editId); if (idx !== -1) all[idx] = { ...all[idx], ...form, staffId: user.id, tahun: selectedTahun }; }
        else { all.push({ ...form, id: generateId(), staffId: user.id, tahun: selectedTahun }); }
        setData('logbooks', all); setShowForm(false);
    };
    const deleteLogbook = (id) => { if (confirm('Padam logbook ini?')) { const all = getData('logbooks'); setData('logbooks', all.filter(l => l.id !== id)); } };
    return (
        <div className="fade-in">
            <div className="flex justify-between items-center mb-6 flex-wrap gap-2">
                <h2 className="text-2xl font-bold text-gray-800">Logbook Harian</h2>
                <div className="flex gap-2 items-center">
                    <select value={selectedTahun} onChange={e => setSelectedTahun(parseInt(e.target.value))} className="px-3 py-2 border rounded-lg text-sm">{yearOptions.map(y => <option key={y} value={y}>{y}</option>)}</select>
                    <button onClick={addLogbook} className="px-4 py-2 bg-emerald-600 text-white rounded-lg text-sm hover:bg-emerald-700">+ Tambah Logbook</button>
                </div>
            </div>
            <div className="grid gap-4">
                {logbooks.sort((a, b) => b.tarikh.localeCompare(a.tarikh)).map(lb => (<div key={lb.id} className="bg-white rounded-xl p-6 shadow-sm border border-gray-100 card-hover"><div className="flex justify-between items-start mb-3"><span className="bg-emerald-100 text-emerald-700 px-3 py-1 rounded-full text-xs font-medium">{lb.tarikh}</span><div className="flex gap-2"><button onClick={() => editLogbook(lb)} className="px-3 py-1 bg-blue-100 text-blue-700 rounded text-xs">Edit</button><button onClick={() => deleteLogbook(lb.id)} className="px-3 py-1 bg-red-100 text-red-700 rounded text-xs">Padam</button></div></div><p className="text-gray-800 font-medium mb-1">{lb.aktiviti}</p>{lb.catatan && <p className="text-gray-600 text-sm">{lb.catatan}</p>}</div>))}
                {logbooks.length === 0 && <p className="text-center text-gray-500 py-8">Tiada logbook untuk tahun {selectedTahun}. Klik butang "Tambah Logbook" untuk mula.</p>}
            </div>
            {showForm && <Modal title={editId ? 'Edit Logbook' : 'Tambah Logbook'} onClose={() => setShowForm(false)}>
                <div className="space-y-4"><Field label="Tarikh" type="date" value={form.tarikh} onChange={v => setForm({...form, tarikh: v})} /><div><label className="block text-sm font-medium text-gray-700 mb-1">Aktiviti Harian</label><textarea value={form.aktiviti} onChange={e => setForm({...form, aktiviti: e.target.value})} rows={3} className="w-full px-3 py-2 border rounded-lg" placeholder="Terangkan aktiviti hari ini" /></div><div><label className="block text-sm font-medium text-gray-700 mb-1">Catatan</label><textarea value={form.catatan} onChange={e => setForm({...form, catatan: e.target.value})} rows={2} className="w-full px-3 py-2 border rounded-lg" placeholder="Catatan tambahan (pilihan)" /></div><Field label="URL Gambar (pilihan)" value={form.gambar} onChange={v => setForm({...form, gambar: v})} /></div>
                <button onClick={saveLogbook} className="mt-4 w-full bg-emerald-600 text-white py-2 rounded-lg hover:bg-emerald-700">Simpan</button>
            </Modal>}
        </div>
    );
};

// ==================== PERFORMANCE (ADD MARKS WITHOUT DATE) ====================
const PerformancePage = ({ user }) => {
    const isAdmin = user.role === 'admin';
    const [students] = useState(isAdmin ? getData('students') : getData('students').filter(s => s.kelas === user.kelas));
    const [marks, setMarks] = useState(getData('studentMarks'));
    const [showForm, setShowForm] = useState(false);
    const [form, setForm] = useState({ studentId: '', subjek: '', markah: '' });
    const [filterStudent, setFilterStudent] = useState('');
    const addMark = () => { setForm({ studentId: '', subjek: '', markah: '' }); setShowForm(true); };
    const saveMark = () => {
        if (!form.studentId || !form.subjek || !form.markah) return alert('Lengkapkan maklumat');
        const all = [...marks]; const stu = students.find(s => s.id === form.studentId);
        all.push({ ...form, id: generateId(), markah: parseInt(form.markah), tahunSesi: stu?.tahunSesi || new Date().getFullYear() });
        setData('studentMarks', all); setMarks(all); setShowForm(false);
    };
    const deleteMark = (id) => { setData('studentMarks', marks.filter(m => m.id !== id)); setMarks(marks.filter(m => m.id !== id)); };
    const filteredStudents = filterStudent ? students.filter(s => s.id === filterStudent) : students;
    return (
        <div className="fade-in">
            <div className="flex justify-between items-center mb-6 flex-wrap gap-2"><h2 className="text-2xl font-bold text-gray-800">Prestasi Murid - Markah</h2><button onClick={addMark} className="px-4 py-2 bg-emerald-600 text-white rounded-lg text-sm hover:bg-emerald-700">+ Tambah Markah</button></div>
            <div className="mb-4"><select value={filterStudent} onChange={e => setFilterStudent(e.target.value)} className="px-3 py-2 border rounded-lg text-sm"><option value="">Semua Murid</option>{students.map(s => <option key={s.id} value={s.id}>{s.nama} ({s.kelas})</option>)}</select></div>
            {filteredStudents.map(s => {
                const sMarks = marks.filter(m => m.studentId === s.id); if (sMarks.length === 0 && filterStudent === s.id) return <p key={s.id} className="text-gray-500 text-center py-4">Tiada rekod markah untuk {s.nama}</p>;
                if (sMarks.length === 0) return null;
                const avg = sMarks.length > 0 ? Math.round(sMarks.reduce((sum, m) => sum + m.markah, 0) / sMarks.length) : 0; const avgGrade = getGradeForMark(avg);
                const gradeColor = avgGrade === 'A' ? 'bg-emerald-100 text-emerald-700' : avgGrade === 'B' ? 'bg-blue-100 text-blue-700' : avgGrade === 'C' ? 'bg-amber-100 text-amber-700' : 'bg-red-100 text-red-700';
                return (<div key={s.id} className="bg-white rounded-xl p-6 shadow-sm border border-gray-100 mb-4"><div className="flex justify-between items-start mb-4"><div><h3 className="font-bold text-gray-800">{s.nama}</h3><p className="text-sm text-gray-500">{s.kelas} • {s.tahun} Tahun</p></div><div className="text-right"><span className="text-2xl font-bold text-gray-800">{avg}%</span><br /><span className={`px-3 py-1 rounded-full text-sm font-bold ${gradeColor}`}>Gred: {avgGrade}</span></div></div>
                    <table className="w-full text-sm"><thead className="bg-gray-50"><tr><th className="px-4 py-2 text-left font-medium text-gray-600">Subjek</th><th className="px-4 py-2 text-center font-medium text-gray-600">Markah</th><th className="px-4 py-2 text-center font-medium text-gray-600">Gred</th><th className="px-4 py-2 text-center font-medium text-gray-600"></th></tr></thead><tbody className="divide-y divide-gray-100">
                        {sMarks.map(m => (<tr key={m.id}><td className="px-4 py-2 font-medium">{m.subjek}</td><td className="px-4 py-2 text-center">{m.markah}</td><td className="px-4 py-2 text-center"><span className={`px-2 py-1 rounded text-xs font-bold ${getGradeForMark(m.markah) === 'A' ? 'bg-emerald-100 text-emerald-700' : getGradeForMark(m.markah) === 'B' ? 'bg-blue-100 text-blue-700' : getGradeForMark(m.markah) === 'C' ? 'bg-amber-100 text-amber-700' : 'bg-red-100 text-red-700'}`}>{getGradeForMark(m.markah)}</span></td><td className="px-4 py-2 text-center"><button onClick={() => deleteMark(m.id)} className="px-2 py-1 bg-red-100 text-red-700 rounded text-xs">Padam</button></td></tr>))}
                    </tbody></table></div>);
            })}
            {showForm && <Modal title="Tambah Markah Peperiksaan" onClose={() => setShowForm(false)}>
                <div className="space-y-4"><div><label className="block text-sm font-medium text-gray-700 mb-1">Murid</label><select value={form.studentId} onChange={e => setForm({...form, studentId: e.target.value})} className="w-full px-3 py-2 border rounded-lg"><option value="">Pilih Murid</option>{students.map(s => <option key={s.id} value={s.id}>{s.nama} ({s.kelas})</option>)}</select></div><Field label="Subjek" value={form.subjek} onChange={v => setForm({...form, subjek: v})} /><Field label="Markah" type="number" value={form.markah} onChange={v => setForm({...form, markah: v})} /></div>
                <button onClick={saveMark} className="mt-4 w-full bg-emerald-600 text-white py-2 rounded-lg hover:bg-emerald-700">Simpan</button>
            </Modal>}
        </div>
    );
};

// ==================== PERFORMANCE SUMMARY (PRINTABLE WITH ATTENDANCE) ====================
const PerformanceSummaryPage = ({ user }) => {
    const isAdmin = user.role === 'admin';
    const [students] = useState(isAdmin ? getData('students') : getData('students').filter(s => s.kelas === user.kelas));
    const [marks] = useState(getData('studentMarks'));
    const [attData] = useState(getData('studentAttendance'));
    const [filterTahun, setFilterTahun] = useState('');
    const [filterSesi, setFilterSesi] = useState('');
    const [selectedId, setSelectedId] = useState('');
    const currentYear = new Date().getFullYear();
    const yearOptions = []; for (let y = currentYear; y <= 2050; y++) yearOptions.push(y);
    const filtered = students.filter(s => { if (filterTahun && s.tahun !== parseInt(filterTahun)) return false; if (filterSesi && s.tahunSesi !== parseInt(filterSesi)) return false; return true; });
    const selectedStudent = filtered.find(s => s.id === selectedId);
    const handlePrint = () => window.print();
    return (
        <div className="fade-in">
            <h2 className="text-2xl font-bold text-gray-800 mb-6">Ringkasan Prestasi Murid</h2>
            <div className="flex gap-4 mb-4 flex-wrap no-print">
                <select value={filterTahun} onChange={e => setFilterTahun(e.target.value)} className="px-3 py-2 border rounded-lg text-sm"><option value="">Semua Umur</option><option value="4">4 Tahun</option><option value="5">5 Tahun</option><option value="6">6 Tahun</option></select>
                <select value={filterSesi} onChange={e => setFilterSesi(e.target.value)} className="px-3 py-2 border rounded-lg text-sm"><option value="">Semua Sesi</option>{yearOptions.map(y => <option key={y} value={y}>{y}</option>)}</select>
                <select value={selectedId} onChange={e => setSelectedId(e.target.value)} className="px-3 py-2 border rounded-lg text-sm"><option value="">Pilih Murid</option>{filtered.map(s => <option key={s.id} value={s.id}>{s.nama} ({s.kelas})</option>)}</select>
                {selectedId && <button onClick={handlePrint} className="px-4 py-2 bg-gray-600 text-white rounded-lg text-sm">🖨 Cetak</button>}
            </div>
            {selectedStudent && (
                <div className="bg-white rounded-xl shadow-sm border border-gray-100 p-8 print-card max-w-4xl mx-auto">
                    <div className="text-center mb-6 border-b pb-4"><h1 className="text-2xl font-bold text-gray-800">Ringkasan Prestasi Murid</h1><p className="text-gray-500">Sistem Pengurusan PASTI - {selectedStudent.tahunSesi || currentYear}</p></div>
                    <div className="grid grid-cols-2 md:grid-cols-4 gap-4 mb-6 bg-gray-50 p-4 rounded-lg">
                        <div><p className="text-xs text-gray-500">Nama</p><p className="font-semibold">{selectedStudent.nama}</p></div>
                        <div><p className="text-xs text-gray-500">Kelas</p><p className="font-semibold">{selectedStudent.kelas}</p></div>
                        <div><p className="text-xs text-gray-500">Umur</p><p className="font-semibold">{selectedStudent.tahun} Tahun</p></div>
                        <div><p className="text-xs text-gray-500">Sesi</p><p className="font-semibold">{selectedStudent.tahunSesi || currentYear}</p></div>
                    </div>
                    <div className="mb-6">
                        <h3 className="font-bold text-gray-800 mb-3 flex items-center gap-2"><svg className="w-5 h-5 text-blue-600" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M9 12l2 2 4-4m6 2a9 9 0 11-18 0 9 9 0 0118 0z" /></svg>Kehadiran</h3>
                        <div className="bg-emerald-50 p-4 rounded-lg"><p className="text-emerald-800 font-semibold">Jumlah Kehadiran: {attData.filter(a => a.studentId === selectedStudent.id && a.status === 'Hadir').length} hari</p></div>
                    </div>
                    <div>
                        <h3 className="font-bold text-gray-800 mb-3 flex items-center gap-2"><svg className="w-5 h-5 text-amber-600" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M12 6.253v13m0-13C10.832 5.477 9.246 5 7.5 5S4.168 5.477 3 6.253v13C4.168 18.477 5.754 18 7.5 18s3.332.477 4.5 1.253m0-13C13.168 5.477 14.754 5 16.5 5c1.747 0 3.332.477 4.5 1.253v13C19.832 18.477 18.247 18 16.5 18c-1.746 0-3.332.477-4.5 1.253" /></svg>Prestasi Akademik</h3>
                        {(() => {
                            const sMarks = marks.filter(m => m.studentId === selectedStudent.id);
                            if (sMarks.length === 0) return <p className="text-gray-500 text-center py-4">Tiada rekod markah</p>;
                            const avg = Math.round(sMarks.reduce((sum, m) => sum + m.markah, 0) / sMarks.length);
                            const avgGrade = getGradeForMark(avg);
                            const gradeColor = avgGrade === 'A' ? 'bg-emerald-100 text-emerald-700' : avgGrade === 'B' ? 'bg-blue-100 text-blue-700' : avgGrade === 'C' ? 'bg-amber-100 text-amber-700' : 'bg-red-100 text-red-700';
                            return (<div><div className="flex gap-4 mb-4"><div className="bg-blue-50 p-3 rounded-lg flex-1 text-center"><p className="text-sm text-blue-600">Purata Markah</p><p className="text-2xl font-bold text-blue-800">{avg}%</p></div><div className={`${gradeColor} p-3 rounded-lg flex-1 text-center`}><p className="text-sm">Gred Keseluruhan</p><p className="text-2xl font-bold">{avgGrade}</p></div></div>
                                <table className="w-full text-sm print-table"><thead className="bg-gray-50"><tr><th className="px-4 py-2 text-left font-medium text-gray-600">Subjek</th><th className="px-4 py-2 text-center font-medium text-gray-600">Markah</th><th className="px-4 py-2 text-center font-medium text-gray-600">Gred</th></tr></thead><tbody className="divide-y divide-gray-100">
                                    {sMarks.map(m => (<tr key={m.id}><td className="px-4 py-2 font-medium">{m.subjek}</td><td className="px-4 py-2 text-center">{m.markah}</td><td className="px-4 py-2 text-center"><span className={`px-2 py-1 rounded text-xs font-bold ${getGradeForMark(m.markah) === 'A' ? 'bg-emerald-100 text-emerald-700' : getGradeForMark(m.markah) === 'B' ? 'bg-blue-100 text-blue-700' : getGradeForMark(m.markah) === 'C' ? 'bg-amber-100 text-amber-700' : 'bg-red-100 text-red-700'}`}>{getGradeForMark(m.markah)}</span></td></tr>))}
                                </tbody></table></div>);
                        })()}
                    </div>
                </div>
            )}
        </div>
    );
};

// ==================== PERFORMANCE BY YEAR ====================
const PerformanceByYearPage = ({ user }) => {
    const isAdmin = user.role === 'admin';
    const [students] = useState(isAdmin ? getData('students') : getData('students').filter(s => s.kelas === user.kelas));
    const [marks] = useState(getData('studentMarks'));
    const [attData] = useState(getData('studentAttendance'));
    const [filterTahun, setFilterTahun] = useState('');
    const [filterSesi, setFilterSesi] = useState('');
    const currentYear = new Date().getFullYear();
    const yearOptions = []; for (let y = currentYear; y <= 2050; y++) yearOptions.push(y);
    const filtered = students.filter(s => { if (filterTahun && s.tahun !== parseInt(filterTahun)) return false; if (filterSesi && s.tahunSesi !== parseInt(filterSesi)) return false; return true; });
    const handlePrint = () => window.print();
    return (
        <div className="fade-in">
            <div className="flex justify-between items-center mb-6 flex-wrap gap-2">
                <h2 className="text-2xl font-bold text-gray-800">Prestasi Mengikut Tahun</h2>
                <button onClick={handlePrint} className="px-4 py-2 bg-gray-600 text-white rounded-lg text-sm no-print">🖨 Cetak</button>
            </div>
            <div className="flex gap-4 mb-4 flex-wrap no-print">
                <select value={filterTahun} onChange={e => setFilterTahun(e.target.value)} className="px-3 py-2 border rounded-lg text-sm"><option value="">Semua Umur</option><option value="4">4 Tahun</option><option value="5">5 Tahun</option><option value="6">6 Tahun</option></select>
                <select value={filterSesi} onChange={e => setFilterSesi(e.target.value)} className="px-3 py-2 border rounded-lg text-sm"><option value="">Semua Sesi</option>{yearOptions.map(y => <option key={y} value={y}>{y}</option>)}</select>
            </div>
            <div className="bg-white rounded-xl shadow-sm border border-gray-100 p-6 print-card">
                <div className="mb-4"><h3 className="text-lg font-bold text-gray-800">Senarai Prestasi Murid</h3><p className="text-sm text-gray-500">Umur: {filterTahun ? `${filterTahun} Tahun` : 'Semua'} | Sesi: {filterSesi || 'Semua'}</p></div>
                <table className="w-full text-sm print-table"><thead className="bg-gray-50"><tr><th className="px-4 py-2 text-left font-medium text-gray-600">Bil</th><th className="px-4 py-2 text-left font-medium text-gray-600">Nama</th><th className="px-4 py-2 text-left font-medium text-gray-600">Kelas</th><th className="px-4 py-2 text-center font-medium text-gray-600">Kehadiran</th><th className="px-4 py-2 text-center font-medium text-gray-600">Purata</th><th className="px-4 py-2 text-center font-medium text-gray-600">Gred</th></tr></thead><tbody className="divide-y divide-gray-100">
                    {filtered.map((s, idx) => {
                        const sMarks = marks.filter(m => m.studentId === s.id);
                        const sAtt = attData.filter(a => a.studentId === s.id && a.status === 'Hadir').length;
                        const avg = sMarks.length > 0 ? Math.round(sMarks.reduce((sum, m) => sum + m.markah, 0) / sMarks.length) : '-';
                        const grade = avg !== '-' ? getGradeForMark(avg) : '-';
                        const gradeColor = grade === 'A' ? 'bg-emerald-100 text-emerald-700' : grade === 'B' ? 'bg-blue-100 text-blue-700' : grade === 'C' ? 'bg-amber-100 text-amber-700' : grade === 'D' ? 'bg-red-100 text-red-700' : 'bg-gray-100 text-gray-700';
                        return (<tr key={s.id}><td className="px-4 py-2">{idx + 1}</td><td className="px-4 py-2 font-medium">{s.nama}</td><td className="px-4 py-2">{s.kelas}</td><td className="px-4 py-2 text-center"><span className="bg-blue-100 text-blue-700 px-2 py-1 rounded text-xs">{sAtt} hari</span></td><td className="px-4 py-2 text-center font-medium">{avg !== '-' ? `${avg}%` : '-'}</td><td className="px-4 py-2 text-center"><span className={`px-2 py-1 rounded text-xs font-bold ${gradeColor}`}>{grade}</span></td></tr>);
                    })}
                </tbody></table>
                {filtered.length === 0 && <p className="text-center text-gray-500 py-8">Tiada murid dijumpai</p>}
            </div>
        </div>
    );
};

// ==================== APP ====================
const App = () => {
    return (<AuthProvider><AppContent /></AuthProvider>);
};

const AppContent = () => {
    const { user } = useContext(AuthContext);
    const [currentPage, setCurrentPage] = useState('dashboard');
    if (!user) return <Login />;
    const renderPage = () => {
        switch (currentPage) {
            case 'dashboard': return user.role === 'admin' ? <AdminDashboard /> : <StaffDashboard user={user} />;
            case 'profile': return <ProfilePage user={user} />;
            case 'staff': return user.role === 'admin' ? <StaffManagement user={user} /> : <AdminDashboard />;
            case 'staffAttendance': return user.role === 'admin' ? <StaffAttendance /> : <AdminDashboard />;
            case 'gradeManagement': return user.role === 'admin' ? <GradeManagement /> : <AdminDashboard />;
            case 'logbookMonitor': return user.role === 'admin' ? <LogbookMonitor /> : <AdminDashboard />;
            case 'calendar': return <CalendarPage user={user} />;
            case 'students': return <StudentManagement user={user} />;
            case 'studentInfo': return <StudentInfoPage user={user} />;
            case 'studentAttendance': return user.role === 'staff' ? <StudentAttendance user={user} /> : <AdminDashboard />;
            case 'logbook': return user.role === 'staff' ? <LogbookPage user={user} /> : <AdminDashboard />;
            case 'performance': return <PerformancePage user={user} />;
            case 'performanceSummary': return <PerformanceSummaryPage user={user} />;
            case 'performanceByYear': return <PerformanceByYearPage user={user} />;
            default: return user.role === 'admin' ? <AdminDashboard /> : <StaffDashboard user={user} />;
        }
    };
    return (<div className="flex min-h-screen"><Sidebar currentPage={currentPage} setCurrentPage={setCurrentPage} user={user} /><div className="flex-1 overflow-auto"><div className="p-6 lg:p-8">{renderPage()}</div></div></div>);
};

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
